<!DOCTYPE html>
<html>
<head>
  <title>Display and Transform XML</title>
  <script type="text/javascript">
    function display() {
      var xmlURL = "https://raw.githubusercontent.com/alfred311/outcome-3-badge/main/badges.xml";  
      var xmlstyleURL = "https://zzx2453712793-blip.github.io/xml-viewer/style.xsl";

      var request = new XMLHttpRequest();
      
      // 1. 先获取 XSL（异步但顺序执行）
      request.open("GET", xmlstyleURL, false);
      try {
        request.send();
      } catch (e) {
        alert("XSL 加载失败：" + e);
        return;
      }
      
      // 确保正确解析为 XML 文档
      var xslDoc;
      if (request.responseXML) {
        xslDoc = request.responseXML;
      } else {
        // 备用：手动解析
        var parser = new DOMParser();
        xslDoc = parser.parseFromString(request.responseText, "text/xml");
      }

      // 2. 获取 XML
      request.open("GET", xmlURL, false);
      try {
        request.send();
      } catch (e) {
        alert("XML 加载失败：" + e);
        return;
      }
      
      var xmlDoc;
      if (request.responseXML) {
        xmlDoc = request.responseXML;
      } else {
        var parser = new DOMParser();
        xmlDoc = parser.parseFromString(request.responseText, "text/xml");
      }

      // 3. 执行 XSLT 转换（仍使用现有逻辑，忽略弃用警告）
      try {
        if (window.ActiveXObject) {
          // IE 旧版
          var result = xmlDoc.transformNode(xslDoc);
          document.getElementById("output").innerHTML = result;
        } else {
          // 现代浏览器（尽管弃用，但依然可用）
          var processor = new XSLTProcessor();
          processor.importStylesheet(xslDoc);
          var fragment = processor.transformToFragment(xmlDoc, document);
          var output = document.getElementById("output");
          output.innerHTML = '';            // 清空
          output.appendChild(fragment);
        }
      } catch (err) {
        alert("XSLT 转换错误：" + err);
        console.error(err);
      }
    }
  </script>
</head>
<body onload="display()">
  <div id="output"></div>
</body>
</html>
